<div class="logo-container">
  <div class="logo-left">
    <div class="logo-icon">{{ logoLetter() }}</div>
    <span class="logo-text">{{ displayName() }}</span>
  </div>
  <button class="collapse-btn" (click)="sidebar.toggleCollapse()" [title]="sidebar.isCollapsed() ? 'Expand' : 'Collapse'">
    <i class="material-icons-round" style="font-size: 1.2rem;">
      {{ sidebar.isCollapsed() ? 'chevron_right' : 'chevron_left' }}
    </i>
  </button>
</div>

<nav class="nav-links">
  @for (item of menuItems; track item.route) {
    <a
      [routerLink]="item.route"
      routerLinkActive="active"
      class="nav-item"
      [title]="sidebar.isCollapsed() ? item.label : ''"
      (click)="sidebar.closeMobile()"
    >
      <i class="material-icons-round">{{ item.icon }}</i>
      <span class="nav-label">{{ item.label }}</span>
    </a>
  }
</nav>

<div class="footer">
  <button class="sign-out-btn" (click)="signOut()" [title]="sidebar.isCollapsed() ? 'Sign Out' : ''">
    <i class="material-icons-round" style="font-size: 1.1rem;">logout</i>
    <span class="btn-label">Sign Out</span>
  </button>
</div>
